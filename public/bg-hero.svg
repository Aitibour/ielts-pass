<svg width="1440" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#012269"/>
      <stop offset="50%" stop-color="#045cb4"/>
      <stop offset="100%" stop-color="#0A8C51"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%">
      <stop offset="0%" stop-color="#046bd2" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%">
      <stop offset="0%" stop-color="#0A8C51" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <pattern id="heroGrid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="white" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <pattern id="heroDots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="white" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1440" height="800" fill="url(#heroGrad)"/>
  <rect width="1440" height="800" fill="url(#glow1)"/>
  <rect width="1440" height="800" fill="url(#glow2)"/>
  <rect width="1440" height="800" fill="url(#heroGrid)"/>
  <rect width="1440" height="800" fill="url(#heroDots)"/>
  <!-- Decorative shapes -->
  <circle cx="100" cy="600" r="200" fill="white" opacity="0.02"/>
  <circle cx="1300" cy="200" r="300" fill="white" opacity="0.03"/>
  <circle cx="700" cy="100" r="150" fill="#C8102F" opacity="0.05"/>
  <ellipse cx="400" cy="400" rx="500" ry="300" fill="white" opacity="0.015"/>
  <!-- Book/education decorative elements -->
  <rect x="1100" y="500" width="120" height="160" rx="8" fill="white" opacity="0.03" transform="rotate(-15 1160 580)"/>
  <rect x="1120" y="520" width="120" height="160" rx="8" fill="white" opacity="0.025" transform="rotate(-5 1180 600)"/>
  <rect x="200" y="200" width="80" height="100" rx="6" fill="white" opacity="0.025" transform="rotate(10 240 250)"/>
</svg>
